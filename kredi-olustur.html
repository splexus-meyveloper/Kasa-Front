<div class="row justify-content-between align-items-center mb-20">
    <div class="col-12 col-lg-auto">
        <div class="page-heading">
            <h3>Krediler</h3>
        </div>
    </div>
</div>

<div class="row">
<div class="col-12">
    <div class="box">

        <div class="box-head">
            <h3 class="title">Yeni Kredi Oluştur</h3>
        </div>

        <div class="box-body">

            <div class="row">

                <!-- BANKA -->
                <div class="col-md-6 mb-20">
                    <label>Banka</label>
                    <select class="form-control" id="krediBanka">

                        <option value="">Banka Seçiniz</option>

                        <option value="ZIRAAT">Ziraat Bankası</option>
                        <option value="IS_BANKASI">İş Bankası</option>
                        <option value="GARANTI_BBVA">Garanti BBVA</option>
                        <option value="AKBANK">Akbank</option>
                        <option value="YAPI_KREDI">Yapı Kredi</option>
                        <option value="HALKBANK">Halkbank</option>
                        <option value="VAKIFBANK">Vakıfbank</option>
                        <option value="QNB_FINANSBANK">QNB Finansbank</option>
                        <option value="DENIZBANK">Denizbank</option>
                        <option value="TEB">TEB</option>
                        <option value="DIGER">Diğer</option>

                    </select>
                </div>

                <!-- KREDİ TUTARI -->
                <div class="col-md-6 mb-20">
                    <label>Kredi Tutarı</label>
                    <input
                        type="text"
                        class="form-control money-input"
                        id="krediTutar">
                </div>

                <!-- TAKSİT SAYISI -->
                <div class="col-md-4 mb-20">
                    <label>Taksit Sayısı</label>
                    <input
                        type="number"
                        class="form-control"
                        id="krediTaksit">
                </div>

                <!-- AYLIK FAİZ ORANI -->
                <div class="col-md-4 mb-20">
                    <label>Aylık Faiz Oranı (%) <small style="color:#94a3b8">— boş bırakılırsa faizsiz</small></label>
                    <input
                        type="number"
                        class="form-control"
                        id="krediInterestRate"
                        min="0"
                        max="100"
                        step="0.01"
                        placeholder="0.00">
                </div>

                <!-- ÖDEME GÜNÜ -->
                <div class="col-md-4 mb-20">
                    <label>Ödeme Günü</label>
                    <select
                        class="form-control"
                        id="krediOdemeGunu">

                        <option value="">Seçiniz</option>

                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                        <option value="18">18</option>
                        <option value="19">19</option>
                        <option value="20">20</option>
                        <option value="21">21</option>
                        <option value="22">22</option>
                        <option value="23">23</option>
                        <option value="24">24</option>
                        <option value="25">25</option>
                        <option value="26">26</option>
                        <option value="27">27</option>
                        <option value="28">28</option>
                        <option value="29">29</option>
                        <option value="30">30</option>
                        <option value="31">31</option>

                    </select>
                </div>

                <!-- BUTON -->
                <div class="col-12">

                    <button
    type="button"
    class="button button-primary"
    id="krediKaydetBtn">

    Krediyi Kaydet

</button>

                </div>

            </div>

        </div>

    </div>
</div>
</div>
