<div class="row mb-20" style="align-items:center;justify-content:space-between;display:flex;flex-wrap:wrap;gap:10px;padding:0 15px">
  <h3 class="title mb-0">Banka Hesapları</h3>
  <button class="button button-primary" id="btnYeniHesapAc">
    <i class="zmdi zmdi-plus"></i> Yeni Hesap Ekle
  </button>
</div>

<!-- YENİ HESAP FORMU -->
<div class="row mb-30" id="yeniHesapForm" style="display:none">
  <div class="col-12">
    <div class="box">
      <div class="box-head">
        <h4 class="title mb-0">Yeni Banka Hesabı</h4>
      </div>
      <div class="box-body">
        <div class="row">
          <div class="col-md-3 mb-20">
            <label>Hesap Kodu</label>
            <input type="text" id="bankaHesapKodu" class="form-control" placeholder="örn. GARANTI-1">
          </div>
          <div class="col-md-3 mb-20">
            <label>Banka Adı</label>
            <input type="text" id="bankaBankaAdi" class="form-control" placeholder="örn. Garanti BBVA">
          </div>
          <div class="col-md-3 mb-20">
            <label>Hesap Numarası</label>
            <input type="text" id="bankaHesapNo" class="form-control" placeholder="IBAN veya hesap no">
          </div>
          <div class="col-md-3 mb-20">
            <label>Başlangıç Bakiyesi (TL)</label>
            <input type="text" id="bankaBakiye" class="form-control money-input" placeholder="0,00" inputmode="decimal" autocomplete="off">
          </div>
          <div class="col-12" style="display:flex;gap:10px">
            <button class="button button-primary" id="btnHesapKaydet">
              <i class="zmdi zmdi-save"></i> Kaydet
            </button>
            <button class="button button-secondary" id="btnHesapIptal">
              Vazgeç
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- İŞLEM KODLARI YÖNETİMİ -->
<div class="row mb-30" id="islemKodlariPanel">
  <div class="col-12">
    <div class="box">
      <div class="box-head d-flex justify-content-between align-items-center">
        <h4 class="title mb-0">İşlem Kodları Yönetimi</h4>
        <div style="display:flex;gap:8px">
          <button class="button button-secondary" id="btnIslemKodlariToggle" style="font-size:12px;padding:4px 12px">
            <i class="zmdi zmdi-chevron-down"></i> Göster/Gizle
          </button>
          <button class="button button-primary" id="btnHazirKodlariEkle" style="font-size:12px;padding:4px 14px">
            <i class="zmdi zmdi-playlist-plus"></i> 309.xx Kodlarını Toplu Ekle
          </button>
        </div>
      </div>
      <div class="box-body" id="islemKodlariBody" style="display:none">

        <!-- KOD LİSTESİ -->
        <div id="islemKodlariAdminList" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;min-height:36px">
          <span style="font-size:11px;color:#64748b">Yükleniyor...</span>
        </div>

        <!-- YENİ KOD FORMU -->
        <div style="border-top:1px solid rgba(255,255,255,.07);padding-top:14px">
          <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px">Yeni Kod Ekle</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
            <div>
              <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">İşlem Kodu</label>
              <input type="text" id="yeniKodKod" class="form-control" placeholder="örn. 309.01.001" style="width:160px">
            </div>
            <div>
              <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">Açıklama</label>
              <input type="text" id="yeniKodAciklama" class="form-control" placeholder="örn. HALK KK" style="width:200px">
            </div>
            <div>
              <label style="font-size:11px;color:#64748b;display:block;margin-bottom:4px">Yön</label>
              <select id="yeniKodYon" class="form-control" style="width:120px">
                <option value="OUT">Çıkış (Gider)</option>
                <option value="IN">Giriş (Gelir)</option>
              </select>
            </div>
            <button class="button button-primary" id="btnIslemKoduKaydet" style="height:38px;padding:0 18px;font-size:13px">
              <i class="zmdi zmdi-plus"></i> Ekle
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- HESAP KARTLARI -->
<div class="row" id="bankaHesaplarContainer">
  <div class="col-12" style="padding:40px;text-align:center;color:#64748b">Yükleniyor...</div>
</div>
