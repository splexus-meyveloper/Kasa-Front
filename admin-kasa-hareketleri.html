<div class="row">

    <div class="col-12 mb-30">
<div class="box dashboard-card">
    <div class="box-head d-flex align-items-center justify-content-between">
        <h4 class="title">Kasa Hareketleri</h4>
        <div style="display:flex;gap:8px">
            <button id="tabKasaBtn" class="btn-modern" style="font-size:12px;padding:6px 14px;background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3)"
                onclick="switchAdminTab('hareketler')">Kasa Hareketleri</button>
            <button id="tabPosBtn" class="btn-modern" style="font-size:12px;padding:6px 14px"
                onclick="switchAdminTab('pos')">POS Logları</button>
        </div>
    </div>

            <div class="box-body">

                <!-- FİLTRE ALANI -->
<div class="row mb-20">

    <div class="col-md-3">
        <label>Başlangıç Tarihi</label>
        <input type="date" id="filterStartDate" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Bitiş Tarihi</label>
        <input type="date" id="filterEndDate" class="form-control">
    </div>

    <div class="col-md-3">
        <label>İşlem Türü</label>
        <select id="filterType" class="form-control">
            <option value="">Tümü</option>

            <option value="CASH_INCOME">Kasa Giriş</option>
            <option value="CASH_EXPENSE">Kasa Çıkış</option>

            <option value="CHECK_IN">Çek Giriş</option>
            <option value="CHECK_COLLECT">Çek Tahsil Edildi</option>
            <option value="CHECK_ENDORSE">Çek Ciro Edildi</option>

            <option value="NOTE_IN">Senet Giriş</option>
            <option value="NOTE_COLLECT">Senet Tahsil Edildi</option>
            <option value="NOTE_ENDORSE">Senet Ciro Edildi</option>

            <option value="LOAN_CREATE">Kredi Ekleme</option>
            <option value="LOAN_INSTALLMENT">Kredi Ödeme</option>

            <option value="EXPENSE_ADD">Masraf</option>
        </select>
    </div>

    <div class="col-md-3">
        <label>Kullanıcı</label>
        <select id="filterUser" class="form-control">
            <option value="">Tümü</option>
        </select>
    </div>

    <div class="col-12 mt-15 d-flex gap-2">
        <button class="btn-modern" onclick="applyFilter()">Filtrele</button>
        <button class="btn-modern" onclick="clearFilter()">Temizle</button>
    </div>

</div>


<!-- TABLO -->
<div class="table-responsive">
<table id="kasaTable" class="table users-table table-fixed">
    <colgroup>
        <col style="width:16%">
        <col style="width:10%">
        <col style="width:18%">
        <col>
        <col style="width:14%">
    </colgroup>
    <thead>
        <tr>
            <th>Tarih</th>
            <th>Kullanıcı</th>
            <th class="text-center">İşlem Türü</th>
            <th>Açıklama</th>
            <th class="text-end">Tutar</th>
        </tr>
    </thead>
    <tbody id="kasaTableBody"></tbody>
</table>
</div>

<div id="adminTotals" class="summary-bar" style="display:none">
    <div class="summary-item summary-income">
        <span class="summary-label">Toplam Giriş</span>
        <span class="summary-value" id="adminTotalIncome">0,00 TL</span>
    </div>
    <div class="summary-item summary-expense">
        <span class="summary-label">Toplam Çıkış</span>
        <span class="summary-value" id="adminTotalExpense">0,00 TL</span>
    </div>
    <div class="summary-item summary-net">
        <span class="summary-label">Net</span>
        <span class="summary-value" id="adminTotalNet">0,00 TL</span>
    </div>
</div>

<!-- POS LOGLARI PANELİ -->
<div id="posLoglarPanel" style="display:none">
  <div class="table-responsive">
    <table class="table users-table">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Kullanıcı</th>
          <th>POS Tipi</th>
          <th>Terminal</th>
          <th class="text-end">Tutar</th>
          <th>Açıklama</th>
        </tr>
      </thead>
      <tbody id="posLogsBody">
        <tr><td colspan="6" class="text-center text-muted" style="padding:24px">Yükleniyor...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</div>
</div>
</div>
</div>

<style>
.table td, .table th {
    color: #8b8d9b;
    font-weight: 500;
}
.table th {
    font-weight: 600;
}
</style>
