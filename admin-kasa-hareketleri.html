<div class="row">

    <div class="col-12 mb-30">
<div class="box dashboard-card">
    <div class="box-head">
        <h4 class="title">Kasa Hareketleri</h4>
    </div>

            <div class="box-body">

                <!-- FİLTRE ALANI -->
<div class="row mb-20">

    <div class="col-md-3">
        <label>Başlangıç Tarihi</label>
        <input type="date" id="filterStartDate" class="form-control">
    </div>

    <div class="col-md-3">
        <label>Bitiş Tarihi</label>
        <input type="date" id="filterEndDate" class="form-control">
    </div>

    <div class="col-md-3">
        <label>İşlem Türü</label>
        <select id="filterType" class="form-control" onchange="onAdminFilterTypeChange()">
            <option value="">Tümü</option>

            <option value="CASH_INCOME">Kasa Nakit Giriş</option>
            <option value="CASH_EXPENSE">Kasa Nakit Çıkış</option>
            <option value="POS_LOG">Kredi Kartı İşlemleri</option>

            <option value="CHECK_IN">Çek Giriş</option>
            <option value="CHECK_COLLECT">Çek Tahsil Edildi</option>
            <option value="CHECK_ENDORSE">Çek Ciro Edildi</option>

            <option value="NOTE_IN">Senet Giriş</option>
            <option value="NOTE_COLLECT">Senet Tahsil Edildi</option>
            <option value="NOTE_ENDORSE">Senet Ciro Edildi</option>

            <option value="LOAN_CREATE">Kredi Ekleme</option>
            <option value="LOAN_INSTALLMENT">Kredi Ödeme</option>

            <option value="EXPENSE_ADD">Masraf</option>
        </select>
    </div>

    <div class="col-md-3">
        <label>Kullanıcı</label>
        <select id="filterUser" class="form-control">
            <option value="">Tümü</option>
        </select>
    </div>

    <!-- Masraf Türü alt filtresi (EXPENSE_ADD seçilince görünür) -->
    <div id="masrafTuruWrapper" class="col-md-3 mt-15" style="display:none">
        <label>Masraf Türü</label>
        <select id="filterMasrafTuru" class="form-control">
            <option value="">Tümü</option>
            <option value="ELEKTRIK">ELEKTRİK</option>
            <option value="SU">SU</option>
            <option value="ILETISIM">İLETİŞİM</option>
            <option value="KARGO_NAKLIYE">KARGO-NAKLİYE</option>
            <option value="ARAC_GIDERLERI">ARAÇ GİDERLERİ</option>
            <option value="IS_YERI">İŞ YERİ</option>
            <option value="ATOLYE">ATÖLYE</option>
            <option value="YEMEK">YEMEK</option>
            <option value="MARKET">MARKET</option>
            <option value="KIRTASIYE">KIRTASİYE</option>
            <option value="SEYAHAT">SEYAHAT</option>
            <option value="NILUFERKOY">NİLÜFERKÖY</option>
            <option value="ORTAK_GIDER">ORTAK GİDER</option>
            <option value="ALI_ALTIKARDESLER">ALİ ALTIKARDEŞLER</option>
            <option value="ATINC_ALTIKARDESLER">ATINÇ ALTIKARDEŞLER</option>
            <option value="KIVANC_ALTIKARDESLER">KIVANÇ ALTIKARDEŞLER</option>
            <option value="PERVIN_ALTIKARDESLER">PERVİN ALTIKARDEŞLER</option>
            <option value="CEZA">CEZA</option>
            <option value="YAKIT">YAKIT</option>
            <option value="DIGER">DİĞER</option>
        </select>
    </div>

    <!-- Masraf Ödeme Şekli alt filtresi (EXPENSE_ADD seçilince görünür) -->
    <div id="masrafOdemeWrapper" class="col-md-3 mt-15" style="display:none">
        <label>Ödeme Şekli</label>
        <select id="filterMasrafOdemeSekli" class="form-control">
            <option value="">Tümü</option>
            <option value="CASH">Nakit</option>
            <option value="CREDIT_CARD">Kredi Kartı</option>
        </select>
    </div>

    <!-- POS Tipi alt filtresi (POS_LOG seçilince görünür) -->
    <div id="posTipiWrapper" class="col-md-3 mt-15" style="display:none">
        <label>POS Tipi</label>
        <select id="filterPosTipi" class="form-control">
            <option value="">Tümü</option>
            <option value="ALTIKARDESLER_POS">ALTIKARDEŞLER POS</option>
            <option value="TEDARIKCI_POS">TEDARİKÇİ POS</option>
        </select>
    </div>

    <div class="col-12 mt-15 d-flex gap-2">
        <button class="btn-modern" onclick="applyFilter()">Filtrele</button>
        <button class="btn-modern" onclick="clearFilter()">Temizle</button>
    </div>

</div>


<!-- TABLO -->
<div class="table-responsive">
<table id="kasaTable" class="table users-table table-fixed">
    <colgroup>
        <col style="width:16%">
        <col style="width:10%">
        <col style="width:18%">
        <col>
        <col style="width:14%">
    </colgroup>
    <thead>
        <tr>
            <th>Tarih</th>
            <th>Kullanıcı</th>
            <th class="text-center">İşlem Türü</th>
            <th>Açıklama</th>
            <th class="text-end">Tutar</th>
        </tr>
    </thead>
    <tbody id="kasaTableBody"></tbody>
</table>
</div>

<div id="adminTotals" class="summary-bar" style="display:none">
    <div class="summary-item summary-income">
        <span class="summary-label">Toplam Giriş</span>
        <span class="summary-value" id="adminTotalIncome">0,00 TL</span>
    </div>
    <div class="summary-item summary-expense">
        <span class="summary-label">Toplam Çıkış</span>
        <span class="summary-value" id="adminTotalExpense">0,00 TL</span>
    </div>
    <div class="summary-item summary-net">
        <span class="summary-label">Net</span>
        <span class="summary-value" id="adminTotalNet">0,00 TL</span>
    </div>
</div>


</div>
</div>
</div>
</div>

<style>
.table td, .table th {
    color: #8b8d9b;
    font-weight: 500;
}
.table th {
    font-weight: 600;
}
</style>
