<div class="row">

    <div class="col-12 mb-30">
        <div class="box dashboard-card">
            <div class="box-head">
                <h4 class="title">Benim İşlemlerim</h4>
            </div>

            <div class="box-body">

                <!-- FİLTRE + PDF -->
                <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:18px">

                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px">İşlem Türü</label>
                    <select id="myActFilterType" style="height:36px;min-width:160px;font-size:13px;padding:0 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:#0f172a;color:#e2e8f0;outline:none">
                      <option value="">Tümü</option>
                      <option value="CASH_INCOME">Kasa Giriş</option>
                      <option value="CASH_EXPENSE">Kasa Çıkış</option>
                      <option value="CHECK_IN">Çek Giriş</option>
                      <option value="CHECK_COLLECT">Çek Tahsil</option>
                      <option value="CHECK_OUT">Çek Ödeme</option>
                      <option value="NOTE_IN">Senet Giriş</option>
                      <option value="NOTE_COLLECT">Senet Tahsil</option>
                      <option value="LOAN_CREATE">Kredi Oluşturma</option>
                      <option value="EXPENSE_ADD">Masraf</option>
                      <option value="POS_LOG">POS İşlemi</option>
                      <option value="BANKA_CIKIS">Bankaya Para Yatırma</option>
                    </select>
                  </div>

                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Başlangıç</label>
                    <input type="date" id="myActFilterStart"
                      style="height:36px;font-size:13px;padding:0 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:#0f172a;color:#e2e8f0;outline:none;min-width:150px">
                  </div>

                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Bitiş</label>
                    <input type="date" id="myActFilterEnd"
                      style="height:36px;font-size:13px;padding:0 10px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:#0f172a;color:#e2e8f0;outline:none;min-width:150px">
                  </div>

                  <div style="display:flex;gap:8px">
                    <button class="button button-primary" id="btnMyActFiltrele" style="height:36px;padding:0 16px;font-size:13px">
                      <i class="zmdi zmdi-filter-list"></i> Filtrele
                    </button>
                    <button class="button button-secondary" id="btnMyActTemizle" style="height:36px;padding:0 14px;font-size:13px">
                      <i class="zmdi zmdi-close"></i> Temizle
                    </button>
                    <button class="button button-secondary" id="btnMyActPdf" style="height:36px;padding:0 14px;font-size:13px;color:#f59e0b;border-color:rgba(245,158,11,.3)">
                      <i class="zmdi zmdi-download"></i> PDF
                    </button>
                  </div>

                </div>

                <div class="table-responsive">
                <table id="myActivitiesTable" class="table users-table table-fixed">
                    <colgroup>
                        <col style="width:16%">
                        <col style="width:18%">
                        <col>
                        <col style="width:14%">
                        <col style="width:11%">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Tarih</th>
                            <th class="text-center">İşlem Türü</th>
                            <th>Açıklama</th>
                            <th class="text-end">Tutar</th>
                            <th class="text-center">İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="myActivitiesTableBody"></tbody>
                </table>
                </div>

                <div id="myActivitiesTotals" class="summary-bar" style="display:none">
                    <div class="summary-item summary-income">
                        <span class="summary-label">Toplam Giriş</span>
                        <span class="summary-value" id="myTotalIncome">0,00 TL</span>
                    </div>
                    <div class="summary-item summary-expense">
                        <span class="summary-label">Toplam Çıkış</span>
                        <span class="summary-value" id="myTotalExpense">0,00 TL</span>
                    </div>
                    <div class="summary-item summary-net">
                        <span class="summary-label">Net</span>
                        <span class="summary-value" id="myTotalNet">0,00 TL</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>
<div id="editModal" class="kasa-modal">

  <div class="kasa-modal-overlay" onclick="closeEditModal()"></div>

  <div class="kasa-modal-card">

    <button class="kasa-modal-close" onclick="closeEditModal()">×</button>
    <h3 id="editModalTitle" style="margin:0 0 20px">İşlem Düzenle</h3>

    <div class="kasa-form-group">
      <label for="editAmount">Tutar</label>
      <input id="editAmount" class="kasa-modal-input" type="number" placeholder="0.00">
    </div>

    <!-- Çek alanları -->
    <div id="editCheckFields" style="display:none">
      <div class="kasa-form-group">
        <label for="editCheckNo">Çek No</label>
        <input id="editCheckNo" class="kasa-modal-input" type="text" placeholder="Çek numarası">
      </div>
      <div class="kasa-form-group">
        <label for="editBank">Banka</label>
        <select id="editBank" class="kasa-modal-input">
          <option value="">Seçiniz...</option>
          <option value="ZIRAAT">Ziraat</option>
          <option value="IS_BANKASI">İş Bankası</option>
          <option value="GARANTI_BBVA">Garanti</option>
          <option value="AKBANK">Akbank</option>
          <option value="YAPI_KREDI">Yapı Kredi</option>
          <option value="HALKBANK">Halkbank</option>
          <option value="VAKIFBANK">Vakıfbank</option>
          <option value="QNB_FINANSBANK">QNB Finansbank</option>
          <option value="DENIZBANK">Denizbank</option>
          <option value="TEB">TEB</option>
          <option value="DIGER">Diğer</option>
        </select>
      </div>
      <div class="kasa-form-group">
        <label for="editDueDate">Vade Tarihi</label>
        <input id="editDueDate" class="kasa-modal-input" type="date">
      </div>
    </div>

    <!-- Senet alanları -->
    <div id="editNoteFields" style="display:none">
      <div class="kasa-form-group">
        <label for="editNoteNo">Senet No</label>
        <input id="editNoteNo" class="kasa-modal-input" type="text" placeholder="Senet numarası">
      </div>
      <div class="kasa-form-group">
        <label for="editNoteDueDate">Vade Tarihi</label>
        <input id="editNoteDueDate" class="kasa-modal-input" type="date">
      </div>
    </div>

    <div class="kasa-form-group">
      <label for="editDesc">Açıklama</label>
      <textarea id="editDesc" class="kasa-modal-textarea" placeholder="Açıklama (opsiyonel)"></textarea>
    </div>

    <div class="kasa-modal-footer">
      <button class="btn-modern" onclick="submitEditRequest()">İstek Gönder</button>
      <button class="btn-delete" onclick="closeEditModal()">Vazgeç</button>
    </div>

  </div>
</div>
