<h3 class="mb-20">Çek Portföyü</h3>

<!-- ÜST SEKME: Müşteri / Kendi -->
<div class="check-tab-bar" id="checkMainTabBar">
  <button class="check-tab-btn active" data-main-tab="musteri">
    <i class="zmdi zmdi-accounts"></i> Müşteri Çekleri
  </button>
  <button class="check-tab-btn" data-main-tab="kendi">
    <i class="zmdi zmdi-receipt"></i> Çeklerim
  </button>
</div>

<!-- MÜŞTERİ ÇEKLERİ PANELİ -->
<div id="mainTab-musteri" class="check-main-panel active">

  <!-- Şube branch sekmeleri -->
  <div class="check-branch-tab-bar">
    <button class="check-branch-btn active" data-branch="merkez" id="branchBtn-merkez">
      <i class="zmdi zmdi-city-alt"></i>
      <span id="branchTabLabel-merkez">Kendi Şubemiz</span>
      <span class="branch-count" id="cnt-branch-merkez">0</span>
    </button>
    <button class="check-branch-btn" data-branch="adapazari" id="branchBtn-adapazari">
      <i class="zmdi zmdi-pin"></i>
      <span id="branchTabLabel-adapazari">Diğer Şube</span>
      <span class="branch-count" id="cnt-branch-adapazari">0</span>
    </button>
  </div>

  <!-- MERKEZ ÇEKLERİ -->
  <div id="branchPanel-merkez" class="branch-panel">
    <div class="check-sub-tab-bar">
      <button class="check-sub-btn active" data-sub="merkez-portfoyde">
        <span class="sub-dot dot-blue"></span> Portföyde
        <span class="sub-count" id="cnt-merkez-portfoyde">0</span>
      </button>
      <button class="check-sub-btn" data-sub="merkez-tamamlanan">
        <span class="sub-dot dot-green"></span> Tamamlanan
        <span class="sub-count" id="cnt-merkez-tamamlanan">0</span>
      </button>
      <button class="check-sub-btn" data-sub="merkez-sorunlu">
        <span class="sub-dot dot-red"></span> Sorunlu
        <span class="sub-count" id="cnt-merkez-sorunlu">0</span>
      </button>
    </div>
    <div id="merkez-portfoyde"  class="check-sub-panel active"><div class="row" id="checkContainer-merkez-portfoyde"></div></div>
    <div id="merkez-tamamlanan" class="check-sub-panel"><div class="row" id="checkContainer-merkez-tamamlanan"></div></div>
    <div id="merkez-sorunlu"    class="check-sub-panel"><div class="row" id="checkContainer-merkez-sorunlu"></div></div>
  </div>

  <!-- ADAPAZARI ÇEKLERİ -->
  <div id="branchPanel-adapazari" class="branch-panel" style="display:none">
    <div class="check-sub-tab-bar">
      <button class="check-sub-btn active" data-sub="adapazari-portfoyde">
        <span class="sub-dot dot-blue"></span> Portföyde
        <span class="sub-count" id="cnt-adapazari-portfoyde">0</span>
      </button>
      <button class="check-sub-btn" data-sub="adapazari-tamamlanan">
        <span class="sub-dot dot-green"></span> Tamamlanan
        <span class="sub-count" id="cnt-adapazari-tamamlanan">0</span>
      </button>
      <button class="check-sub-btn" data-sub="adapazari-sorunlu">
        <span class="sub-dot dot-red"></span> Sorunlu
        <span class="sub-count" id="cnt-adapazari-sorunlu">0</span>
      </button>
    </div>
    <div id="adapazari-portfoyde"  class="check-sub-panel active"><div class="row" id="checkContainer-adapazari-portfoyde"></div></div>
    <div id="adapazari-tamamlanan" class="check-sub-panel"><div class="row" id="checkContainer-adapazari-tamamlanan"></div></div>
    <div id="adapazari-sorunlu"    class="check-sub-panel"><div class="row" id="checkContainer-adapazari-sorunlu"></div></div>
  </div>

</div>

<!-- ÇEKLERİM PANELİ -->
<div id="mainTab-kendi" class="check-main-panel">
  <div class="check-sub-tab-bar">
    <button class="check-sub-btn active" data-sub="kendi-portfoyde">
      <span class="sub-dot dot-blue"></span> Portföyde
      <span class="sub-count" id="cnt-kendi-portfoyde">0</span>
    </button>
    <button class="check-sub-btn" data-sub="kendi-tamamlanan">
      <span class="sub-dot dot-green"></span> Tamamlanan
      <span class="sub-count" id="cnt-kendi-tamamlanan">0</span>
    </button>
    <button class="check-sub-btn" data-sub="kendi-sorunlu">
      <span class="sub-dot dot-red"></span> Sorunlu
      <span class="sub-count" id="cnt-kendi-sorunlu">0</span>
    </button>
  </div>
  <div id="kendi-portfoyde"  class="check-sub-panel active"><div class="row" id="checkContainer-kendi-portfoyde"></div></div>
  <div id="kendi-tamamlanan" class="check-sub-panel"><div class="row" id="checkContainer-kendi-tamamlanan"></div></div>
  <div id="kendi-sorunlu"    class="check-sub-panel"><div class="row" id="checkContainer-kendi-sorunlu"></div></div>
</div>
