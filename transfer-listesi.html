<h3 class="mb-20">Transfer Geçmişi</h3>

<div class="check-sub-tab-bar" style="margin-bottom:20px">
  <button class="check-sub-btn active" data-transfer-tab="bekleyen">
    <span class="sub-dot dot-amber"></span> Bekleyenler
    <span class="sub-count" id="cnt-transfer-bekleyen">0</span>
  </button>
  <button class="check-sub-btn" data-transfer-tab="tamamlanan">
    <span class="sub-dot dot-green"></span> Tamamlanan
    <span class="sub-count" id="cnt-transfer-tamamlanan">0</span>
  </button>
  <button class="check-sub-btn" data-transfer-tab="reddedilen">
    <span class="sub-dot dot-red"></span> Reddedilen
    <span class="sub-count" id="cnt-transfer-reddedilen">0</span>
  </button>
</div>

<div id="transferTab-bekleyen"   class="transfer-tab-panel active"></div>
<div id="transferTab-tamamlanan" class="transfer-tab-panel"></div>
<div id="transferTab-reddedilen" class="transfer-tab-panel"></div>
