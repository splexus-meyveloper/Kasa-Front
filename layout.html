<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Kasa App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/vendor/material-design-iconic-font.min.css">
    <link rel="stylesheet" href="assets/css/vendor/font-awesome.min.css">
    <link rel="stylesheet" href="assets/css/plugins/plugins.css">
    <link rel="stylesheet" href="assets/css/helper.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/kasapp-ui.css">
    <link id="cus-style" rel="stylesheet" href="assets/css/style-primary.css">
    <link rel="stylesheet" href="assets/css/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    


</head>
<body class="skin-dark">

  <!-- MENU -->
<div class="side-header-menu" id="menuContainer"></div>

    



<div class="header-section">
  <div class="container-fluid h-100 d-flex align-items-center">

    <!-- SOL -->
    <div class="d-flex align-items-center gap-20">

      <!-- SIDEBAR TOGGLE -->
      <button class="side-header-toggle header-btn">
        <i class="zmdi zmdi-menu"></i>
      </button>

      <!-- SAYFA BAŞLIĞI -->
      <div class="header-title">
        <h4 id="pageTitle"></h4>
      </div>

    </div>


    <!-- ORTA: ARAMA -->
    <div class="header-search d-none d-lg-block">
      <input type="text" placeholder="İşlem, kullanıcı veya kasa ara...">
      <i class="zmdi zmdi-search"></i>
    </div>


    <!-- SAĞ -->
    <ul class="header-notification-area d-flex align-items-center mb-0 ms-auto">

      <!-- BİLDİRİM -->
      <li>
        <button class="header-action-btn">
          <i class="zmdi zmdi-notifications"></i>
        </button>
      </li>

      <!-- USER -->
      <li class="adomx-dropdown">

        <a class="toggle" href="#">
          <span class="user d-flex align-items-center">

            <span class="avatar">
              <img src="assets/images/avatar/avatar-1.png">
            </span>

            <span class="name ms-2" id="headerUserName"></span>

            <i class="zmdi zmdi-chevron-down ms-1"></i>

          </span>
        </a>

        <div class="adomx-dropdown-menu dropdown-menu-user">

          <div class="head">
            <h5 class="name">
              <a href="#" id="dropdownUserName"></a>
            </h5>
          </div>

          <div class="body">
            <ul>

              <li>
                <a href="#">
                  <i class="zmdi zmdi-account"></i>
                  Profil
                </a>
              </li>

              <li>
                <a href="javascript:void(0)" onclick="logout()">
                  <i class="zmdi zmdi-lock-open"></i>
                  Çıkış Yap
                </a>
              </li>

            </ul>
          </div>

        </div>

      </li>

    </ul>

  </div>
</div>

    <!-- 🔥 DEĞİŞEN İÇERİK BURAYA GELECEK -->
    <div class="content-body">
    <div id="pageContent"></div>

</div>


    

</div>



<!-- JS -->
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <script src="assets/js/auth-guard.js"></script>
<script src="assets/js/vendor/jquery-3.3.1.min.js"></script>
<script src="assets/js/menu.js"></script>
<script src="assets/js/main-v2.js"></script>
<script src="assets/js/kasa-app-v2.js"></script>
<script src="assets/js/admin-users.js"></script>
<script src="assets/js/admin-log.js"></script>



<script>
fetch('menu.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('menuContainer').innerHTML = html;

    // 🔥 BURASI KRİTİK
    initMenu();
  });
</script>
</script>


<div id="toastBox"></div>
</body>
</html>
