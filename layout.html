<!-- 🔥 PRELOADER -->
 <div id="pageLoader" style="
    position:fixed;
    inset:0;
    background:#0f172a;
    z-index:9999;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
">

</div>

      <button class="side-header-toggle header-btn">

        <h4 id="pageTitle"></h4>
      </div>

    <!-- ORTA -->

    </div>

    <!-- SAĞ -->
    <div class="header-right d-flex align-items-center">

      <ul class="header-notification-area d-flex align-items-center mb-0">

        <!-- NOTIFICATION -->
        <li class="adomx-dropdown">

            <i class="zmdi zmdi-notifications"></i>
            <span id="notificationCount" class="notif-badge">0</span>
          </button>

          <div id="notificationDropdown" class="adomx-dropdown-menu dropdown-menu-user">
            <div class="head">
              <h5>Bildirimler</h5>
            </div>
            <div class="body" id="notifList">
              <div class="p-2 text-muted">Yükleniyor...</div>
            </div>
          </div>
        </li>

        <!-- USER -->
        <li class="adomx-dropdown">
          <a class="toggle" href="#">
            <span class="user d-flex align-items-center">
              <span class="avatar">
                <img src="assets/images/avatar/avatar-1.png">
              </span>
              <span class="name ms-2" id="headerUserName"></span>
              <i class="zmdi zmdi-chevron-down ms-1"></i>
            </span>
          </a>

          <div class="adomx-dropdown-menu dropdown-menu-user">
            <div class="head">
              <h5 class="name">
                <a href="#" id="dropdownUserName"></a>
              </h5>
            </div>

            <div class="body">
              <ul>
                <li>
                  <a href="javascript:void(0)" onclick="logout()">
                    <i class="zmdi zmdi-power"></i>
                    Çıkış Yap
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </li>

      </ul>
    </div>

<!-- TAKVİM EVENT DETAY MODAL -->
<div id="eventModal" class="kasa-modal">
  <div class="kasa-modal-overlay" data-close="eventModal"></div>

  <div class="kasa-modal-card">
    <button type="button" class="kasa-modal-close" data-close="eventModal">×</button>

    <div class="kasa-modal-header">
      <div class="kasa-modal-icon" id="modalIcon">
        <i class="zmdi zmdi-info-outline"></i>
      </div>
      <div>
        <h3 id="modalTitle" class="kasa-modal-title">Detay</h3>
        <div id="modalSubtitle" class="kasa-modal-subtitle">Takvim kaydı</div>
      </div>
    </div>

    <div class="kasa-modal-body">
      <div class="kasa-modal-row">
        <span>Tarih</span>
        <strong id="modalDate">-</strong>
      </div>

      <div class="kasa-modal-row">
        <span>Tutar</span>
        <strong id="modalAmount">-</strong>
      </div>

      <div class="kasa-modal-row">
        <span>Tür</span>
        <strong id="modalType">-</strong>
      </div>

      <div class="kasa-modal-row">
        <span>Açıklama</span>
        <strong id="modalDesc">-</strong>
      </div>

      <div class="kasa-modal-row">
        <span>Durum</span>
        <strong id="modalStatus">-</strong>
      </div>
    </div>
  </div>
</div>

<!-- TAKVİM NOT MODAL -->
<div id="noteModal" class="kasa-modal">
  <div class="kasa-modal-overlay" data-close="noteModal"></div>

  <div class="kasa-modal-card">
    <button type="button" class="kasa-modal-close" data-close="noteModal">×</button>

    <div class="kasa-modal-header">
      <div class="kasa-modal-icon kasa-modal-icon-note">
        <i class="zmdi zmdi-edit"></i>
      </div>
      <div>
        <h3 class="kasa-modal-title">Takvime Not Ekle</h3>
        <div class="kasa-modal-subtitle">Seçilen güne not ekleyin</div>
      </div>
    </div>

    <div class="kasa-modal-body">
      <div class="kasa-form-group">
        <label for="noteDate">Tarih</label>
        <input type="date" id="noteDate" class="kasa-modal-input">
      </div>

      <div class="kasa-form-group">
        <label for="noteText">Not</label>
        <textarea id="noteText" class="kasa-modal-textarea" placeholder="Notunuzu yazın..."></textarea>
      </div>
    </div>

    <div class="kasa-modal-footer">
      <button type="button" class="button button-secondary" data-close="noteModal">Vazgeç</button>
      <button type="button" class="button button-primary" id="saveNoteBtn">Kaydet</button>
    </div>
  </div>
</div>

<!-- GLOBAL DYNAMIC MODAL -->
<div id="dynamicModal" class="kasa-modal">
  <div class="kasa-modal-overlay" data-close="dynamicModal"></div>

  <div class="kasa-modal-card">
    <button type="button" class="kasa-modal-close" data-close="dynamicModal">×</button>

    <div class="kasa-modal-header">
      <div class="kasa-modal-icon" id="dynamicModalIcon">
        <i class="zmdi zmdi-info-outline"></i>
      </div>
      <div>
        <h3 id="dynamicModalTitle" class="kasa-modal-title">Başlık</h3>
        <div id="dynamicModalSubtitle" class="kasa-modal-subtitle"></div>
      </div>
    </div>

    <div id="dynamicModalBody" class="kasa-modal-body"></div>

    <div class="kasa-modal-footer">
      <button type="button" class="button button-secondary" data-close="dynamicModal">
        Vazgeç
      </button>
      <button type="button" class="button button-primary" onclick="submitPaid()">
       Kaydet
      </button>
    </div>
  </div>
</div>

<!-- 🔥 PRELOADER SCRIPT -->

<script>
window.addEventListener("load", function () {

    const logo = document.getElementById("loaderLogo");
    const text = document.getElementById("loaderText");
    const spinner = document.getElementById("loaderSpinner");
    const loader = document.getElementById("pageLoader");

    // 1️⃣ Logo
    setTimeout(() => {
        logo.style.transition = "0.8s";
        logo.style.opacity = "1";
        logo.style.transform = "translateY(0)";
    }, 500);

    // 2️⃣ Alt yazı
    setTimeout(() => {
        text.style.transition = "0.8s";
        text.style.opacity = "1";
        text.style.transform = "translateY(0)";
    }, 900);

    // 3️⃣ Spinner
    setTimeout(() => {
        spinner.style.transition = "0.6s";
        spinner.style.opacity = "1";
    }, 1400);

    // 4️⃣ Kapat (EN KRİTİK)
    setTimeout(() => {
        loader.style.transition = "0.8s";
        loader.style.opacity = "0";

        setTimeout(() => {
            loader.style.display = "none";
        }, 800);

    }, 3000); // 🔥 BURASI ANA SÜRE

});
</script>
