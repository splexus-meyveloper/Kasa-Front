<!doctype html>
<html class="no-js" lang="tr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Giriş Yap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="shortcut icon" type="image/x-icon" href="assets/images/favicon.ico">

    <link rel="stylesheet" href="assets/css/vendor/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/vendor/material-design-iconic-font.min.css">
    <link rel="stylesheet" href="assets/css/plugins/plugins.css">
    <link rel="stylesheet" href="assets/css/helper.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link id="cus-style" rel="stylesheet" href="assets/css/style-primary.css">
    <link rel="stylesheet" href="assets/css/login-page.css">
</head>

<body class="skin-dark">

<div class="main-wrapper">
    <div class="content-body m-0 p-0">
        <div class="login-register-wrap">
            <div class="row m-0">

                <div class="col-lg-5 col-12 p-0 login-left-side">
                    <div class="login-left-inner">
                        <div class="login-register-form-wrap">

                            <div class="content">
                                <h1>Giriş Yap</h1>
                                <p>Yönetim paneline giriş yapın</p>
                            </div>

                            <div class="login-register-form">
                                <form id="loginForm">
                                    <div class="row">

                                        <div class="col-12 mb-20">
                                            <input class="form-control" type="text" id="companyCode" placeholder="Firma Kodu">
                                        </div>

                                        <div class="col-12 mb-20">
                                            <input class="form-control" type="text" id="username" placeholder="Kullanıcı Adı">
                                        </div>

                                        <div class="col-12 mb-20">
                                            <input class="form-control" type="password" id="password" placeholder="Şifre">
                                        </div>

                                        <div class="col-12 mt-10">
                                            <button type="submit" class="button button-primary button-outline login-btn">
                                                Giriş Yap
                                            </button>
                                        </div>

                                    </div>
                                </form>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="login-register-bg col-lg-7 col-12 p-0 login-right-side">
                    <div class="content">
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- PRELOADER -->
<div id="preloader" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.70);
    z-index:9999;
    align-items:center;
    justify-content:center;
">
    <div style="text-align:center; color:white;">
        <div class="spinner-border text-light" style="width:50px; height:50px;"></div>
        <p style="margin-top:15px;">Giriş yapılıyor...</p>
    </div>
</div>

<script src="assets/js/vendor/jquery-3.3.1.min.js"></script>
<script src="assets/js/vendor/bootstrap.min.js"></script>
<script src="assets/js/main-v2.js"></script>
<script src="assets/js/config.js"></script>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const companyCode = document.getElementById("companyCode").value.trim();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!companyCode || !username || !password) {
        alert("Firma kodu, kullanıcı adı ve şifre giriniz!");
        return;
    }

    try {
        document.getElementById("preloader").style.display = "flex";

        const res = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                companyCode: companyCode,
                username: username,
                password: password
            })
        });

        if (!res.ok) {
            document.getElementById("preloader").style.display = "none";
            const err = await res.text();
            alert("Giriş başarısız: " + err);
            return;
        }

        const data = await res.json();

        localStorage.setItem("token", data.token);
        localStorage.setItem("username", data.username);
        localStorage.setItem("role", data.role);
        localStorage.setItem("permissions", JSON.stringify(data.permissions));

        window.location.href = "layout.html";

    } catch (err) {
        console.error(err);
        document.getElementById("preloader").style.display = "none";
        alert("Sunucuya bağlanılamadı!");
    }
});
</script>

</body>
</html>
