<div class="box">

  <div class="box-head">
    <h4 class="title">Çek Girişi</h4>
  </div>

  <div class="box-body">

    <div class="row">

      <!-- Çek No -->
      <div class="col-md-6 mb-20">
        <label>Çek No</label>
        <div class="input-group">
          <span class="input-icon">
            <i class="zmdi zmdi-assignment"></i>
          </span>
          <input type="text" id="checkNo" class="form-control">
        </div>
      </div>

      <!-- Banka -->
      <div class="col-md-6 mb-20">
<label>Banka</label>
<select id="bank" class="form-control">
<option value="">Seçiniz...</option>
<option value="ZIRAAT">Ziraat</option>
<option value="IS_BANKASI">İş Bankası</option>
<option value="GARANTI_BBVA">Garanti</option>
<option value="AKBANK">Akbank</option>
<option value="YAPI_KREDI">Yapı Kredi</option>
<option value="HALKBANK">Halkbank</option>
<option value="VAKIFBANK">Vakıfbank</option>
<option value="QNB_FINANSBANK">QNB Finansbank</option>
<option value="DENIZBANK">Denizbank</option>
<option value="TEB">TEB</option>
<option value="DIGER">Diğer</option>
</select>
</div>

      <!-- Vade -->
      <div class="col-md-6 mb-20">
        <label>Vade Tarihi</label>
        <div class="input-group">
          <span class="input-icon">
            <i class="zmdi zmdi-calendar"></i>
          </span>
          <input type="date" id="dueDate" class="form-control">
        </div>
      </div>

      <!-- Tutar -->
      <div class="col-md-6 mb-20">
        <label>Tutar</label>
        <div class="input-group">
          <span class="input-icon">
            ₺
          </span>
          <input id="tutar" type="text" class="form-control">
        </div>
      </div>

      <!-- Açıklama -->
      <div class="col-md-12 mb-20">
        <label>Açıklama</label>
        <textarea id="description"
          class="form-control"
          rows="4"></textarea>
      </div>

    </div>

    <div style="display:flex; justify-content:flex-end; margin-top:10px;">
      <button id="btnCheckIn" type="button" class="button button-primary">
        <i class="zmdi zmdi-check"></i>
        Çeki Kaydet
      </button>
    </div>

  </div>

</div>
