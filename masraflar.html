

<div class="row">

    <div class="col-12">
        <div class="box">
            <div class="box-head">
                <h3 class="title">Masraf Ekle</h3>
            </div>
            <div class="box-body">
                <form>

                    <div class="row">

                        <div class="col-md-6 mb-20">
    <label>Masraf Türü</label>
    <select id="expenseType" class="form-control">
        <option value="">Seçiniz...</option>
        <option value="YEMEK">Yemek</option>
        <option value="MARKET">Market</option>
        <option value="CEZA">Ceza</option>
        <option value="ILETISIM">İletişim</option>
        <option value="KARGO">Kargo</option>
        <option value="YAKIT">Yakıt</option>
        <option value="DIGER">Diğer</option>
    </select>
</div>

<div class="col-md-6 mb-20">
    <label>Tutar</label>
    <input type="text" id="tutar" class="form-control" placeholder="Tutar giriniz">
</div>

<div class="col-md-12 mb-20">
    <label>Açıklama</label>
    <textarea id="description" class="form-control" placeholder="Açıklama"></textarea>
</div>

<div class="col-12">
    <button type="button" id="expenseSaveBtn" class="button button-primary">
    Kaydet
</button>

</div>

                        </div>

                    </div>

                </form>
            </div>
        </div>
    </div>

</div>
