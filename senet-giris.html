

<div class="row">
<div class="col-12">

<div class="box">

<div class="box-head">
<h3 class="title">Senet Girişi</h3>
</div>

<div class="box-body">

<form>

<div class="row">

<!-- Senet No -->
<div class="col-md-6 mb-20">
<label>Senet No</label>

<div class="form-icon">
<i class="zmdi zmdi-assignment"></i>
<input type="text" id="noteNo" class="form-control" placeholder="Senet Numarası">
</div>

</div>

<!-- Vade Tarihi -->
<div class="col-md-6 mb-20">
<label>Vade Tarihi</label>
<input type="date" id="dueDate" class="form-control">
</div>

<!-- Tutar -->
<div class="col-md-6 mb-20">
<label>Tutar</label>

<div class="form-icon">
<span class="currency">₺</span>
<input type="text" id="tutar" class="form-control money-input" placeholder="0,00" inputmode="decimal" autocomplete="off">
</div>

</div>

<!-- Açıklama -->
<div class="col-md-12 mb-20">
<label>Açıklama</label>
<textarea id="description" class="form-control" placeholder="Açıklama"></textarea>
</div>

<!-- Button -->
<div class="col-12">
<button id="btnNoteIn" type="button" class="button button-primary">
Kaydet
</button>
</div>

</div>

</form>

</div>

</div>

</div>
</div>
